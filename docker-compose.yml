services:

  # ── Databases ─────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: eksp_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: eksp_user
      POSTGRES_PASSWORD: eksp_password
      POSTGRES_DB: eksp_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eksp_user -d eksp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eksp_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: eksp_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - eksp_network

  # ── Application services ───────────────────────────────────────────────────

  backend:
    build: ./Backend
    container_name: eksp_backend
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      ai-pipeline:
        condition: service_started
    volumes:
      - ./Backend:/app
    networks:
      - eksp_network

  ai-pipeline:
    build: ./AI_pipeline
    container_name: eksp_ai_pipeline
    ports:
      - "8000:8000"
    env_file:
      - ./AI_pipeline/.env
    depends_on:
      qdrant:
        condition: service_started
    volumes:
      - ./AI_pipeline:/app
      - uploads_data:/app/uploads
    networks:
      - eksp_network

  frontend:
    build: ./Frontend
    container_name: eksp_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - eksp_network

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  qdrant_data:
  uploads_data:

# ── Network ────────────────────────────────────────────────────────────────
networks:
  eksp_network:
    driver: bridge
